services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.0
    ports:
      - "8080:8080"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 8080
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --artifacts-destination /mlartifacts
    restart: unless-stopped
